# Plesk-style Apache Virtual Host Configuration
<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html
    
    # Plesk-style directory configuration
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Plesk default: deny access to hidden files
        <FilesMatch "^\.">
            Require all denied
        </FilesMatch>
        
        # Plesk default: deny access to sensitive files
        <FilesMatch "\.(env|git|gitignore|gitattributes|lock)$">
            Require all denied
        </FilesMatch>
    </Directory>
    
    # Logging (Plesk-style paths)
    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined
    
    # Plesk default: PHP settings via .htaccess allowed
    <IfModule mod_php.c>
        php_flag display_errors off
        php_value error_log /var/log/apache2/php-error.log
    </IfModule>
    
    # Compression (Plesk default)
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>
    
    # Browser caching (Plesk default)
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpeg "access plus 1 week"
        ExpiresByType image/png "access plus 1 week"
        ExpiresByType text/css "access plus 1 week"
        ExpiresByType application/javascript "access plus 1 week"
    </IfModule>
    
    # Security headers (common in Plesk)
    <IfModule mod_headers.c>
        Header set X-Frame-Options "SAMEORIGIN"
        Header set X-Content-Type-Options "nosniff"
        Header set X-XSS-Protection "1; mode=block"
        Header set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>
</VirtualHost>
