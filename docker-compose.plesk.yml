version: '3.8'

# Plesk Emulation Docker Compose
# Run: docker-compose -f docker-compose.plesk.yml up -d

services:
  # Main Apache/PHP service (Plesk-compatible)
  apache:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: molekvm-apache
    ports:
      - "8080:80"
    volumes:
      - ./index.php:/var/www/html/index.php:ro
      - ./.env:/var/www/html/.env:ro
      - apache-logs:/var/log/apache2
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    networks:
      - molekvm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Plesk Panel Emulation (Mock UI)
  plesk-admin:
    build:
      context: ./plesk-admin
      dockerfile: Dockerfile
    container_name: molekvm-plesk-admin
    ports:
      - "8081:80"
    environment:
      - PLESK_MOCK_MODE=true
      - PLESK_VERSION=18.0.50
      - TARGET_WEBSITE_PORT=8080
    networks:
      - molekvm-network
    restart: unless-stopped
    depends_on:
      - apache

  # Nginx alternative (for Plesk Nginx users)
  nginx-alt:
    image: nginx:alpine
    container_name: molekvm-nginx
    ports:
      - "8082:80"
    volumes:
      - ./index.php:/usr/share/nginx/html/index.php:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.env:/usr/share/nginx/html/.env:ro
    networks:
      - molekvm-network
    restart: unless-stopped

volumes:
  apache-logs:
    driver: local

networks:
  molekvm-network:
    driver: bridge
